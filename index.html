<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>JSL-ian Discovery Engine</title>
<style>
:root{--text:#202124;--muted:#5f6368;--blue:#1a73e8;--line:#dadce0;--bg:#fff;--chip:#f1f3f4}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,Arial,"Noto Sans SC",sans-serif}
header{padding:34px 16px 10px;text-align:center}
.brand{font-size:42px;font-weight:800;letter-spacing:-1.8px}.b{color:#1a73e8}.r{color:#ea4335}.y{color:#fbbc05}.g{color:#188038}
.mainSearch{max-width:760px;margin:18px auto 8px;padding:0 14px}
.searchbox{height:52px;border:1px solid var(--line);border-radius:26px;display:flex;align-items:center;padding:0 16px;box-shadow:0 1px 6px rgba(32,33,36,.1);background:white}
.searchbox input{border:0;outline:0;font-size:17px;flex:1;height:42px;min-width:0}
.searchbox button{border:0;background:transparent;color:var(--blue);font-weight:700;font-size:15px}
.actions{display:flex;gap:10px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.actions button{border:1px solid #dadce0;background:#f8f9fa;padding:8px 14px;border-radius:8px;color:#3c4043}
.layout{max-width:1220px;margin:0 auto;padding:12px;display:grid;grid-template-columns:1.15fr .85fr;gap:12px}
.panel{border:1px solid #e5ecf7;background:#fff;border-radius:16px;padding:12px}
.panel h2{margin:0 0 8px;font-size:17px}
.results .item{background:white;border-bottom:1px solid #eee;margin:0;padding:10px 4px}
.url{color:#202124;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{display:inline-block;background:var(--chip);color:#5f6368;font-size:12px;border-radius:10px;padding:2px 8px;margin-right:6px}
.title{color:#1a0dab;font-size:17px;text-decoration:none;display:block;margin-top:5px;line-height:1.3}
.openBtns a{font-size:12px;padding:6px 10px;border:1px solid #dadce0;background:#fff;border-radius:14px;color:#1a73e8;text-decoration:none;display:inline-block;margin-right:6px;margin-top:8px}
.omegaGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.omega{background:white;border:1px solid #e8eaed;border-radius:14px;padding:10px;min-height:132px}
.omega h3{font-size:15px;margin:0 0 7px;color:#1a73e8}
.miniSearch{display:flex;border:1px solid #dadce0;border-radius:18px;height:36px;padding:0 8px;align-items:center}
.miniSearch input{border:0;outline:0;min-width:0;flex:1;font-size:13px}
.miniSearch button{border:0;background:transparent;color:#1a73e8;font-size:12px;font-weight:700}
.miniResults{margin-top:8px;font-size:12px}
.miniResults a{display:block;color:#1a0dab;text-decoration:none;margin:5px 0;line-height:1.25}
.tabs{display:flex;gap:12px;overflow-x:auto;white-space:nowrap;font-size:14px;color:#5f6368;margin:8px 0 10px}
.tab{padding-bottom:8px;cursor:pointer}.tab.active{color:#1a73e8;border-bottom:3px solid #1a73e8}
@media(max-width:900px){.layout{grid-template-columns:1fr}.omegaGrid{grid-template-columns:1fr 1fr}.brand{font-size:34px}}
@media(max-width:560px){.omegaGrid{grid-template-columns:1fr}.brand{font-size:30px}header{padding-top:24px}.layout{padding:10px}.omega{min-height:120px}}

.logoTop{ text-align:center; margin:0 0 8px; }
.logoTop img{ width:115px; max-width:34vw; height:auto; }

</style>
</head>

let currentType='all';

function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}

function res(title,url,source,score){return {title,url,source,score};}
function buildResults(q,type='all'){
 const e=enc(q);
 const list=[
  res(q+' — Google','https://www.google.com/search?q='+e,'Web',92),
  res(q+' — Bing','https://www.bing.com/search?q='+e,'Web',88),

 ];
 return type==='all'?list.sort((a,b)=>b.score-a.score):list.filter(x=>x.source.toLowerCase()===type).sort((a,b)=>b.score-a.score);

function renderMain(q){
 const items=buildResults(q,currentType);
 $('results').innerHTML=items.map(x=>'<div class="item"><div class="url"><span class="badge">'+esc(x.source)+'</span>'+esc(host(x.url))+'</div><a class="title" href="'+x.url+'">'+esc(x.title)+'</a><div class="openBtns"><a href="'+x.url+'">Open</a><a href="'+x.url+'" target="_blank" rel="noopener">New Tab</a></div></div>').join('');
}
function renderMini(i,q){
 const box=$('miniResults'+i);
 if(!q){box.innerHTML='';return}
 const items=buildResults(q,'all').slice(0,3);
 box.innerHTML=items.map(x=>'<a href="'+x.url+'">• '+esc(x.source)+'</a>').join('');
}
function makeOmega(){
 const grid=$('omegaGrid');
 for(let i=0;i<=8;i++){
  const div=document.createElement('div');
  div.className='omega';
  div.innerHTML='<h3>Ω'+i+'</h3><form class="miniSearch" data-i="'+i+'"><input id="omegaQ'+i+'" placeholder="Search"><button>Go</button></form><div class="miniResults" id="miniResults'+i+'"></div>';
  grid.appendChild(div);
 }
 document.querySelectorAll('.miniSearch').forEach(f=>{
  f.addEventListener('submit',e=>{
   e.preventDefault();
   const i=f.dataset.i;
   renderMini(i,$('omegaQ'+i).value.trim());
  });
 });
  if (omegaPackage && omegaPackage.query) {
    $('mainQ').value = omegaPackage.query;
    renderMain(omegaPackage.query);
    sessionStorage.removeItem("OMEGA_HOME_SEARCH");
  }
}
makeOmega();
$('mainForm').addEventListener('submit',e=>{e.preventDefault(); const q=$('mainQ').value.trim(); if(q)renderMain(q);});
$('fillAll').addEventListener('click',()=>{
 const q=$('mainQ').value.trim(); if(!q)return;
 const suffix=['',' AI',' patent',' research',' code',' product',' company',' tutorial',' news'];
 for(let i=0;i<=8;i++){ $('omegaQ'+i).value=q+suffix[i]; renderMini(i,q+suffix[i]); }
 renderMain(q);
});
$('clearAll').addEventListener('click',()=>{
 $('mainQ').value=''; $('results').innerHTML='';
 for(let i=0;i<=8;i++){ $('omegaQ'+i).value=''; renderMini(i,'');}
});
$('tabs').addEventListener('click',e=>{
 if(!e.target.classList.contains('tab'))return;
 document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
 e.target.classList.add('active'); currentType=e.target.dataset.type;
 const q=$('mainQ').value.trim(); if(q)renderMain(q);
});
